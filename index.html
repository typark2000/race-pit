<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>race-pit</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero card">
        <p class="eyebrow">RACE PIT</p>
        <h1>탑뷰 레이스 전략 프로토타입</h1>
        <p class="lead">직접 운전은 안 해. 대신 피트와 타이어로 이긴다.</p>
        <div class="hero-actions">
          <button id="startRaceButton" class="primary-button" type="button">레이스 시작</button>
          <button id="tickButton" class="secondary-button" type="button">1틱 진행</button>
        </div>
      </section>

      <section class="race-layout">
        <section class="track card">
          <div class="section-head">
            <div>
              <p class="eyebrow">TRACK</p>
              <h2>Coastal Ring</h2>
            </div>
            <div class="track-meta">
              <span id="lapLabel" class="chip">Lap 1 / 8</span>
              <span id="phaseLabel" class="chip">pre-race</span>
            </div>
          </div>
          <div class="track-stage">
            <svg id="trackSvg" class="track-svg" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
              <defs>
                <linearGradient id="trackGlow" x1="0%" x2="100%" y1="0%" y2="100%">
                  <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.7" />
                  <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9" />
                  <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.7" />
                </linearGradient>
              </defs>
              <path class="track-shadow" d="M 162 310 C 168 192, 302 92, 440 110 C 536 122, 596 172, 650 164 C 736 152, 866 198, 874 304 C 882 414, 776 504, 644 510 C 534 514, 492 446, 418 450 C 330 454, 248 536, 164 494 C 92 458, 98 378, 162 310 Z" />
              <path id="raceTrackPath" class="track-outline" d="M 162 310 C 168 192, 302 92, 440 110 C 536 122, 596 172, 650 164 C 736 152, 866 198, 874 304 C 882 414, 776 504, 644 510 C 534 514, 492 446, 418 450 C 330 454, 248 536, 164 494 C 92 458, 98 378, 162 310 Z" />
              <path class="track-centerline" d="M 162 310 C 168 192, 302 92, 440 110 C 536 122, 596 172, 650 164 C 736 152, 866 198, 874 304 C 882 414, 776 504, 644 510 C 534 514, 492 446, 418 450 C 330 454, 248 536, 164 494 C 92 458, 98 378, 162 310 Z" />
              <circle class="sector-mark" cx="266" cy="142" r="8" />
              <circle class="sector-mark" cx="788" cy="228" r="8" />
              <circle class="sector-mark" cx="581" cy="495" r="8" />
              <line class="start-line" x1="151" y1="332" x2="201" y2="290" />
              <path id="pitLanePath" class="pit-lane" d="M 148 332 C 165 352, 198 371, 236 374 C 270 376, 301 366, 326 349 C 358 328, 402 286, 454 254" />
              <g id="carsLayer"></g>
            </svg>
          </div>
        </section>

        <section class="order card">
          <div class="section-head">
            <div>
              <p class="eyebrow">ORDER</p>
              <h2>순위표</h2>
            </div>
          </div>
          <div id="orderBoard" class="order-board"></div>
        </section>
      </section>

      <section class="controls card">
        <div class="section-head">
          <div>
            <p class="eyebrow">STRATEGY</p>
            <h2>플레이어 차량 지시</h2>
          </div>
        </div>
        <div id="strategyGrid" class="strategy-grid"></div>
      </section>

      <section class="result card" id="resultCard" hidden>
        <p class="eyebrow">RESULT</p>
        <h2 id="resultTitle">결과</h2>
        <p id="resultSummary" class="lead"></p>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
